name: CI pipeline

on:
  push:
    branches: [main]

jobs:
  run_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: call the install for dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
        env:
          PYTHONPATH: .


  required_matrix_on_coverage:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10
      
      - name: dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests with coverage
        run: pytest --cov=. 
        env:
          PYTHONPATH: . 

  
  a_third_job_linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: dependencies
        run: pip install flake8
      - name: Run 
        run: flake8 . || true